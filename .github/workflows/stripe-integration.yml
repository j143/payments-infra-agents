name: Stripe Integration Tests

on:
  push:
    branches: [ feature/stripe-integration, main ]
  pull_request:
    branches: [ feature/stripe-integration, main ]

jobs:
  stripe-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: payments_infra
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Stripe adapter tests
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/payments_infra
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          NODE_ENV: test
        run: npm test -- stripe.adapter

      - name: Run Stripe webhook tests
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/payments_infra
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          NODE_ENV: test
        run: npm test -- stripe.webhook

      - name: Run Stripe job-queue tests
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/payments_infra
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          NODE_ENV: test
        run: npm test -- job-queue.service.stripe

      - name: Run all Stripe integration tests
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          DATABASE_URL: postgres://user:password@localhost:5432/payments_infra
          NODE_ENV: test
        run: npm test -- stripe

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 7

  stripe-psp-integration:
    runs-on: ubuntu-latest
    needs: stripe-tests
    if: success()

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: payments_infra
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/payments_infra
        run: npm run migrate

      - name: Test PaymentIntent creation with Stripe
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          DATABASE_URL: postgres://user:password@localhost:5432/payments_infra
          NODE_ENV: test
          PSP_PROVIDER: stripe
        run: npx tsx -r dotenv/config scripts/test-stripe.ts

      - name: Verify Stripe configuration
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          if [[ -z "$STRIPE_API_KEY" ]]; then
            echo "❌ STRIPE_API_KEY not configured in GitHub Secrets"
            exit 1
          fi
          if [[ -z "$STRIPE_PUBLISHABLE_KEY" ]]; then
            echo "❌ STRIPE_PUBLISHABLE_KEY not configured in GitHub Secrets"
            exit 1
          fi
          echo "✅ STRIPE_API_KEY configured"
          echo "✅ STRIPE_PUBLISHABLE_KEY configured"
          echo "Stripe PSP provider is ready for integration"

  stripe-capabilities-check:
    runs-on: ubuntu-latest
    needs: stripe-psp-integration
    if: success()

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Check Stripe capabilities in codebase
        run: |
          echo "=== Stripe Integration Capabilities Check ==="
          echo ""
          echo "✅ Adapter functions:"
          grep -E "export (async )?function" src/services/psp/stripe.adapter.ts | sed 's/^/  /'
          echo ""
          echo "✅ Webhook handlers:"
          grep -E "case \"" src/services/psp/stripe.adapter.ts | sed 's/^/  /'
          echo ""
          echo "✅ Environment variables required:"
          grep -E "STRIPE_" .env | grep -v "^#" | sed 's/^/  /'
          echo ""
          echo "=== All Stripe Capabilities Ready ==="

  test-summary:
    runs-on: ubuntu-latest
    needs: [ stripe-tests, stripe-psp-integration, stripe-capabilities-check ]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Print test summary
        run: |
          echo "╔════════════════════════════════════════╗"
          echo "║  Stripe Integration Test Summary      ║"
          echo "╚════════════════════════════════════════╝"
          echo ""
          if [ "${{ needs.stripe-tests.result }}" = "success" ]; then
            echo "✅ Stripe Unit Tests: PASSED"
          else
            echo "❌ Stripe Unit Tests: FAILED"
          fi
          echo ""
          if [ "${{ needs.stripe-psp-integration.result }}" = "success" ]; then
            echo "✅ Stripe PSP Integration: PASSED"
          else
            echo "❌ Stripe PSP Integration: FAILED"
          fi
          echo ""
          if [ "${{ needs.stripe-capabilities-check.result }}" = "success" ]; then
            echo "✅ Stripe Capabilities: VERIFIED"
          else
            echo "❌ Stripe Capabilities: NOT VERIFIED"
          fi
          echo ""
          echo "═══════════════════════════════════════"

      - name: Fail if any job failed
        if: |
          needs.stripe-tests.result != 'success' ||
          needs.stripe-psp-integration.result != 'success' ||
          needs.stripe-capabilities-check.result != 'success'
        run: exit 1
